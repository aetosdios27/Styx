[advisories]
severity-threshold = "high"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    "Zlib",
    "0BSD",
]
deny = []
unlicensed = "deny"

[bans]
multiple-versions = "deny"
skip = [
    { name = "socket2", version = "0.4" },
    { name = "socket2", version = "0.5" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
